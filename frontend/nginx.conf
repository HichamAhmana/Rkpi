server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static frontend (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API routes — forwarded to the NestJS backend, path preserved (no rewrite).
    # $backend_upstream + resolver defer DNS lookup to request time, so nginx
    # still starts cleanly even if the backend container isn't up yet.
    location ~ ^/(zabbix|glpi|report|auth)/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream backend:3000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
