# Production deployment: builds and runs the backend + frontend as two containers.
# The frontend (nginx) is the only public entrypoint; it proxies /zabbix, /glpi,
# /report and /auth to the backend over the internal compose network.
#
# backend/.env must point at the real Zabbix/GLPI databases (not the local
# dev mirrors in docker-compose.yml) and set CORS_ORIGIN to this app's public URL.
#
# VITE_SENTRY_DSN (frontend build arg) is read from a .env file next to this
# compose file (repo root) — Vite bakes it into the JS bundle at build time,
# so it must be set *before* `docker compose build`, not just at runtime.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rkpi_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: rkpi_frontend
    restart: unless-stopped
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
